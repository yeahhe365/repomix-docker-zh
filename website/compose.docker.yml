# Run the packaged website and API using production-style Docker images
# $ docker compose -f website/compose.docker.yml up --build

name: repomix-local-webui

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prebuilt
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - ENABLE_LOCAL_PATH_MODE=true
      - LOCAL_PATH_ALLOWLIST=/Users
    volumes:
      - /Users:/Users:ro
